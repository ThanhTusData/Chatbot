name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI_FALLBACK_EMBEDDER: "true"
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements-ci.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies (CI)
        run: |
          if [ -f requirements-ci.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements-ci.txt
          elif [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements file found. Installing minimal deps for tests."
            python -m pip install --upgrade pip
            pip install pandas scikit-learn pytest flake8 pyyaml
          fi

      - name: Run drift check (optional)
        run: |
          if [ -f monitoring/drift_check.py ]; then
            python monitoring/drift_check.py --baseline data/training_data.json --current data/production_sample.json --out monitoring/reports || echo "drift_check returned non-zero (non-fatal)"
          else
            echo "No drift_check.py present; skipping"
          fi

      - name: Run unit tests
        env:
          PYTEST_ADDOPTS: "-m 'not integration'"
        run: |
          pytest -q

      - name: Lint (optional)
        run: |
          if command -v flake8 >/dev/null 2>&1; then
            flake8 --max-line-length=120
          else
            echo "flake8 not installed; skipping lint."
          fi
